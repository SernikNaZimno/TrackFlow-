version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trackflow
      POSTGRES_PASSWORD: trackflow_secret
      POSTGRES_DB: trackflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trackflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - trackflow
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: trackflow
      RABBITMQ_DEFAULT_PASS: trackflow
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - trackflow
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://trackflow:trackflow_secret@postgres:5432/trackflow_db?schema=public
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://trackflow:trackflow@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - trackflow

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      - NODE_ENV=development
    networks:
      - trackflow

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    networks:
      - trackflow
    depends_on:
      - api

volumes:
  postgres_data:

networks:
  trackflow:
    driver: bridge
